services:
  # Vector Database for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: taarya-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Graph Database for relationships
  neo4j:
    image: neo4j:5.15-community
    container_name: taarya-neo4j
    restart: unless-stopped          # auto-recover if Docker or the OS restarts
    # Remove stale neo4j.pid before starting — prevents the "Neo4j is already
    # running (pid:X)" false-positive that occurs after unclean container exits
    # (Docker Desktop restart, Windows update, etc.)
    entrypoint: ["sh", "-c", "rm -f /data/run/neo4j.pid && exec /startup/docker-entrypoint.sh neo4j"]
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/taarya123
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "taarya123", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s              # give Neo4j a full minute to initialise

  # Spatial Database with Q3C extension
  postgres:
    image: taarya-postgres-custom:latest
    container_name: taarya-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-q3c.sh:/docker-entrypoint-initdb.d/init-q3c.sh
    environment:
      - POSTGRES_USER=taarya
      - POSTGRES_PASSWORD=taarya123
      - POSTGRES_DB=astronomy

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
  postgres_data:
