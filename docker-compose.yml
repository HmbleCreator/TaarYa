# =============================================================================
# TaarYa — Full stack Docker Compose
# =============================================================================
# One-command startup: docker compose up
#
# Services:
#   postgres  — PostgreSQL 16 + Q3C spatial index
#   qdrant    — Vector database (semantic retrieval)
#   neo4j     — Graph database (paper-star-cluster links)
#   app       — TaarYa FastAPI server
#
# Optional GPU service:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# =============================================================================

x-common-env: &common-env
  TZ: UTC
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

x-db-env: &db-env
  POSTGRES_USER: taarya
  POSTGRES_PASSWORD: taarya123
  POSTGRES_DB: astronomy

x-neo4j-env: &neo4j-env
  NEO4J_AUTH: neo4j/taarya123
  NEO4J_PLUGINS: '["apoc"]'

services:
  # ── PostgreSQL with Q3C ────────────────────────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: taarya-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      <<: [*common-env, *db-env]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taarya -d astronomy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taarya-net

  # ── Qdrant vector database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: taarya-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      <<: *common-env
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taarya-net

  # ── Neo4j graph database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.23-community
    container_name: taarya-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      <<: [*common-env, *neo4j-env]
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "taarya123", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - taarya-net

  # ── TaarYa API server ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taarya-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data       # persistent data
      - ./.env:/app/.env       # env vars (create from .env.example)
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql+psycopg2://taarya:taarya123@postgres:5432/astronomy"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "taarya123"
      EMBEDDING_MODEL: "all-MiniLM-L6-v2"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - taarya-net

volumes:
  postgres_data:
    name: taarya-postgres-data
  qdrant_storage:
    name: taarya-qdrant-data
  neo4j_data:
    name: taarya-neo4j-data
  neo4j_logs:
    name: taarya-neo4j-logs

networks:
  taarya-net:
    name: taarya-network
    driver: bridge
