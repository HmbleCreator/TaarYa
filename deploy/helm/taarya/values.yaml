# Default values for taarya.
replicaCount: 1

image:
  repository: hmblecreator/taarya
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: taarya.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

env:
  OPENAI_API_KEY: "your-openai-key-here"
  POSTGRES_USER: "taarya"
  POSTGRES_DB: "astronomy"
  QDRANT_HOST: "qdrant-service"
  NEO4J_URI: "bolt://neo4j-service:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "taarya123"

persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
