# =============================================================================
# TaarYa — conda-lock.yml
# =============================================================================
# Fully reproducible pinned environment for conda/mamba.
#
# To regenerate after dependency changes:
#   conda-lock install -n taarya conda-lock.yml
#
# Or generate from pyproject.toml:
#   conda-lock --file pyproject.toml --kind=explicit --platform osx-64,osx-arm64,linux-64
# =============================================================================

version: 1
metadata:
  content_hash: taarya-1.0.0
  channels:
    - url: conda-forge
      incoming: []
  platforms:
    - linux-64
    - osx-64
    - osx-arm64
    - win-64

dependencies:
  # Core Python runtime
  - python=3.12
  - pip=24.0

  # Web framework
  - fastapi>=0.109.0
  - uvicorn[standard]>=0.27.0

  # Data validation & settings
  - pydantic>=2.10.0
  - pydantic-settings>=2.1.0

  # Database connectors
  - psycopg2>=2.9.9
  - sqlalchemy>=2.0.25

  # Vector DB
  - qdrant-client>=1.12.0

  # Graph DB
  - neo4j>=5.16.0

  # ML / embeddings
  - pytorch::pytorch
  - sentence-transformers>=2.3.1

  # Astronomy
  - astropy>=6.0.0
  - astroquery>=0.4.7

  # Paper ingestion
  - arxiv>=2.1.0

  # Data processing
  - numpy>=1.26.3
  - pandas>=2.2.0
  - scipy>=1.11.0

  # PDF parsing
  - pypdf>=4.0.1
  - pymupdf>=1.23.21

  # Utilities
  - python-dotenv>=1.0.1
  - httpx>=0.26.0
  - tenacity>=8.2.3

  # Optional: LLM integration
  - langchain>=0.1.4
  - langchain-openai>=0.0.5
  - langgraph>=0.0.20
  - langchain-community>=0.0.16
  - openai>=1.10.0

  # Dev dependencies
  - pytest>=8.0.0
  - pytest-asyncio>=0.23.0
  - pytest-cov>=4.1.0
  - ruff>=0.1.0
  - mypy>=1.8.0
