<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaarYa — Dashboard</title>
  <meta name="description" content="TaarYa astronomy research dashboard — system stats and quick search.">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    /* ── Dashboard-specific styles ─────────────────────────── */
    .dash-stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .dash-stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color .2s;
    }
    .dash-stat:hover { border-color: rgba(37,71,244,0.4); }
    .dash-stat-icon { font-size: 18px; color: var(--text-muted); margin-bottom: 4px; }
    .dash-stat-value {
      font-size: 22px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .dash-stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    /* ── Two-column layout ─────────────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .dash-grid { grid-template-columns: 1fr; }
    }

    /* ── Sky map ───────────────────────────────────────────── */
    .sky-map-wrap {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .sky-map-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    #sky-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Region list ───────────────────────────────────────── */
    .region-list {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .region-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .region-row:last-child { border-bottom: none; }
    .region-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .region-coords {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }
    .region-count {
      font-size: 13px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #6ee7b7;
    }
    .region-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
    }

    /* ── Backend badges ────────────────────────────────────── */
    .backend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .be-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .be-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .be-online  { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3);  color: #10b981; }
    .be-offline { background: rgba(239,68,68,.12);  border: 1px solid rgba(239,68,68,.3);   color: #ef4444; }
    .be-dot-on  { background: #10b981; box-shadow: 0 0 4px #10b981; }
    .be-dot-off { background: #ef4444; }

    /* ── Quick search card ─────────────────────────────────── */
    .qs-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 18px 20px;
      margin-top: 16px;
    }
    .qs-card h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .qs-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .qs-input-row .input-group { flex: 1; }

    /* ── Neo4j graph mini-breakdown ────────────────────────── */
    .graph-breakdown {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .graph-mini {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .graph-mini-val {
      font-size: 16px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #a5b4fc;
    }
    .graph-mini-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-top: 3px;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>

  <main class="main-content">
    <!-- Header -->
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>
        <h2 style="margin:0;">Dashboard</h2>
        <p style="margin:4px 0 0;color:var(--text-muted);font-size:13px;">System overview and quick search</p>
      </div>
      <button id="theme-toggle"
        style="background:var(--bg-surface);border:1px solid var(--border);border-radius:50%;
               width:38px;height:38px;display:flex;align-items:center;justify-content:center;
               cursor:pointer;color:var(--text-secondary);transition:all .2s;">
      </button>
    </div>

    <!-- Backend status badges -->
    <div class="backend-row" id="backend-badges">
      <span class="be-badge be-offline"><span class="be-badge-dot be-dot-off"></span>Loading…</span>
    </div>

    <!-- Top stats row -->
    <div class="dash-stats-row" id="stats-row">
      <div class="dash-stat">
        <span class="material-icons dash-stat-icon">star</span>
        <div class="dash-stat-value" id="stat-stars">—</div>
        <div class="dash-stat-label">Stars in DB</div>
      </div>
      <div class="dash-stat">
        <span class="material-icons dash-stat-icon">article</span>
        <div class="dash-stat-value" id="stat-papers">—</div>
        <div class="dash-stat-label">Papers Indexed</div>
      </div>
      <div class="dash-stat">
        <span class="material-icons dash-stat-icon">hub</span>
        <div class="dash-stat-value" id="stat-nodes">—</div>
        <div class="dash-stat-label">Graph Nodes</div>
      </div>
      <div class="dash-stat">
        <span class="material-icons dash-stat-icon">share</span>
        <div class="dash-stat-value" id="stat-rels">—</div>
        <div class="dash-stat-label">Relationships</div>
      </div>
      <div class="dash-stat">
        <span class="material-icons dash-stat-icon">scatter_plot</span>
        <div class="dash-stat-value" id="stat-clusters">—</div>
        <div class="dash-stat-label">Clusters</div>
      </div>
    </div>

    <!-- Neo4j graph breakdown -->
    <div class="graph-breakdown" id="graph-breakdown" style="margin-bottom:18px;">
      <div class="graph-mini"><div class="graph-mini-val" id="neo-stars">—</div><div class="graph-mini-lbl">Star nodes</div></div>
      <div class="graph-mini"><div class="graph-mini-val" id="neo-papers">—</div><div class="graph-mini-lbl">Paper nodes</div></div>
      <div class="graph-mini"><div class="graph-mini-val" id="neo-clusters">—</div><div class="graph-mini-lbl">Cluster nodes</div></div>
    </div>


        <!-- Quick Search -->
    <div class="qs-card">
      <h3>Quick Search</h3>
      <div class="qs-input-row">
        <div class="input-group">
          <label>Search anything</label>
          <input type="text" id="quick-q"
            placeholder='e.g. "stellar evolution" or a Gaia Source ID'>
        </div>
        <button id="qs-btn" class="btn btn-primary" style="height:42px;">
          <span class="material-icons" style="font-size:18px;">search</span> Search
        </button>
      </div>
      <div id="quick-results" class="mt-4"></div>
    </div>


    <!-- Main two-column section -->
    <div class="dash-grid">

      <!-- Sky coverage map -->
      <div class="sky-map-wrap">
        <div class="sky-map-title">Sky Coverage Map</div>
        <svg id="sky-svg" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Background -->
          <rect width="600" height="240" fill="#050810" rx="6"/>

          <!-- Subtle grid lines -->
          <!-- RA lines every 60° -->
          <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
            <line x1="0"   y1="0" x2="0"   y2="240"/>
            <line x1="100" y1="0" x2="100" y2="240"/>
            <line x1="200" y1="0" x2="200" y2="240"/>
            <line x1="300" y1="0" x2="300" y2="240"/>
            <line x1="400" y1="0" x2="400" y2="240"/>
            <line x1="500" y1="0" x2="500" y2="240"/>
            <line x1="600" y1="0" x2="600" y2="240"/>
          </g>
          <!-- Dec lines every 30° -->
          <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
            <line x1="0" y1="40"  x2="600" y2="40"/>
            <line x1="0" y1="80"  x2="600" y2="80"/>
            <line x1="0" y1="120" x2="600" y2="120"/>
            <line x1="0" y1="160" x2="600" y2="160"/>
            <line x1="0" y1="200" x2="600" y2="200"/>
          </g>

          <!-- Equator highlight -->
          <line x1="0" y1="120" x2="600" y2="120"
                stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4 4"/>

          <!-- Galactic plane approx (rough sinusoid) -->
          <path d="M0,155 C60,90 120,60 180,95 S300,175 360,155 S480,60 540,90 S600,130 600,130"
                fill="none" stroke="rgba(251,191,36,0.18)" stroke-width="1.5" stroke-dasharray="3 3"/>

          <!-- RA labels -->
          <g fill="rgba(255,255,255,0.25)" font-size="8" font-family="monospace">
            <text x="2"   y="235">0h</text>
            <text x="96"  y="235">4h</text>
            <text x="196" y="235">8h</text>
            <text x="293" y="235">12h</text>
            <text x="393" y="235">16h</text>
            <text x="493" y="235">20h</text>
            <text x="584" y="235">24h</text>
          </g>
          <!-- Dec labels -->
          <g fill="rgba(255,255,255,0.25)" font-size="8" font-family="monospace" text-anchor="end">
            <text x="598" y="43">+60°</text>
            <text x="598" y="83">+30°</text>
            <text x="598" y="123">0°</text>
            <text x="598" y="163">-30°</text>
            <text x="598" y="203">-60°</text>
          </g>

          <!-- Galactic plane label -->
          <text x="285" y="170" fill="rgba(251,191,36,0.45)" font-size="8"
                font-family="monospace">galactic plane</text>

          <!-- Region circles — injected by JS -->
          <g id="sky-regions"></g>
        </svg>
        <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.35);">
            <span style="display:inline-block;width:24px;height:1px;border-top:1px dashed rgba(251,191,36,.5);"></span>
            Galactic plane
          </div>
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.35);">
            <span style="display:inline-block;width:24px;height:1px;border-top:1px dashed rgba(255,255,255,.3);"></span>
            Celestial equator
          </div>
        </div>
      </div>

      <!-- Region list panel -->
      <div class="region-list">
        <div class="sky-map-title">Seeded Regions</div>
        <div id="region-rows">
          <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">Loading…</div>
        </div>
      </div>
    </div>


  </main>
</div>

<script src="/static/taarya-api.js"></script>
<script src="/static/theme.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
(function () {
  'use strict';
  const { api, render } = TaarYa;

  /* ── Region dot colours ───────────────────────────────────── */
  const REGION_COLORS = ['#38bdf8', '#6ee7b7', '#f472b6'];

  /* ── Map helpers ──────────────────────────────────────────── */
  // Equirectangular projection: RA 0-360 → x 0-600, Dec -90..90 → y 240..0
  function raToX(ra)  { return (ra / 360) * 600; }
  function decToY(dec){ return (90 - dec) / 180 * 240; }

  // Radius in degrees → approximate SVG radius (1° ≈ 1.67px in RA direction)
  function degToR(deg, dec) {
    const raPx  = (deg / 360) * 600;
    const decPx = (deg / 180) * 240;
    return Math.max((raPx + decPx) / 2, 4);
  }

  /* ── Load stats ───────────────────────────────────────────── */
  api.stats().then(data => {
    const pg  = data.postgresql || {};
    const qd  = data.qdrant     || {};
    const neo = data.neo4j      || {};

    // Stat cards
    setText('stat-stars',    fmt(pg.total_stars));
    setText('stat-papers',   fmt(qd.points_count || qd.vectors_count || 0));
    const nodes = (neo.stars||0) + (neo.papers||0) + (neo.clusters||0);
    setText('stat-nodes',    fmt(nodes));
    setText('stat-rels',     fmt(neo.relationships || 0));
    setText('stat-clusters', fmt(neo.clusters || 0));

    // Graph breakdown
    setText('neo-stars',    fmt(neo.stars    || 0));
    setText('neo-papers',   fmt(neo.papers   || 0));
    setText('neo-clusters', fmt(neo.clusters || 0));

    // Backend badges
    const badges = [
      ['PostgreSQL', pg.status],
      ['Qdrant',     qd.status || (qd.exists === false ? 'error' : 'connected')],
      ['Neo4j',      neo.status],
    ];
    document.getElementById('backend-badges').innerHTML = badges.map(([name, st]) => {
      const ok  = st && st !== 'error' && st !== 'disconnected';
      const cls = ok ? 'be-online' : 'be-offline';
      const dot = ok ? 'be-dot-on' : 'be-dot-off';
      return `<span class="be-badge ${cls}"><span class="be-badge-dot ${dot}"></span>${name}</span>`;
    }).join('');

  }).catch(() => {
    document.getElementById('backend-badges').innerHTML =
      '<span class="be-badge be-offline"><span class="be-badge-dot be-dot-off"></span>API Offline</span>';
  });

  /* ── Load regions ─────────────────────────────────────────── */
  api.regions().then(data => {
    const regions = data.regions || [];
    const svgG    = document.getElementById('sky-regions');
    const rowsEl  = document.getElementById('region-rows');

    if (!regions.length) {
      rowsEl.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:12px 0;">No regions found.</div>';
      return;
    }

    // Max count for scaling circle size
    const maxCount = Math.max(...regions.map(r => r.count), 1);

    let rowsHTML = '';
    regions.forEach((r, i) => {
      const color = REGION_COLORS[i % REGION_COLORS.length];
      const x = raToX(r.ra);
      const y = decToY(r.dec);
      const baseR = degToR(r.radius, r.dec);
      // Scale visual radius: smallest 6px, largest 28px based on star count
      const vizR = 6 + ((r.count / maxCount) * 22);

      // SVG circle + label
      svgG.innerHTML += `
        <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${vizR.toFixed(1)}"
                fill="${color}22" stroke="${color}" stroke-width="1.5"
                stroke-dasharray="4 3" opacity="0.85"/>
        <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3"
                fill="${color}" opacity="0.9"/>
        <text x="${(x + vizR + 4).toFixed(1)}" y="${(y + 3).toFixed(1)}"
              fill="${color}" font-size="9" font-family="monospace"
              opacity="0.85">${r.name}</text>`;

      // Region list row
      rowsHTML += `
        <div class="region-row">
          <div style="display:flex;align-items:center;">
            <div class="region-dot" style="background:${color};box-shadow:0 0 6px ${color}66;"></div>
            <div>
              <div class="region-name">${r.name}</div>
              <div class="region-coords">RA ${r.ra}° · Dec ${r.dec}° · r=${r.radius}°</div>
            </div>
          </div>
          <div class="region-count">${fmt(r.count)}</div>
        </div>`;
    });
    rowsEl.innerHTML = rowsHTML;

  }).catch(err => {
    document.getElementById('region-rows').innerHTML =
      `<div style="color:#ef4444;font-size:11px;padding:12px 0;">Failed to load regions: ${err.message}</div>`;
  });

  /* ── Quick search ─────────────────────────────────────────── */
  document.getElementById('qs-btn').addEventListener('click', runSearch);
  document.getElementById('quick-q').addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });

  async function runSearch() {
    const q   = document.getElementById('quick-q').value.trim();
    const out = document.getElementById('quick-results');
    if (!q) return;

    out.innerHTML = render.spinner();
    try {
      const data = await api.hybridSearch({ q, limit: 10 });
      let html = '';

      if (data.semantic?.papers?.length) {
        html += sectionHead('Papers');
        data.semantic.papers.forEach(p => {
          html += render.paperCard({ ...(p.payload || {}), score: p.score });
        });
      }
      if (data.spatial?.stars?.length) {
        html += sectionHead('Stars');
        data.spatial.stars.slice(0, 5).forEach(s => {
          html += render.starCard(s);
        });
      }
      out.innerHTML = html || render.emptyState(`No results for "${q}"`);
    } catch (err) {
      out.innerHTML = render.emptyState('Search failed — ' + err.message);
    }
  }

  /* ── Helpers ──────────────────────────────────────────────── */
  function fmt(n)   { return n != null ? Number(n).toLocaleString() : '—'; }
  function setText(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
  function sectionHead(t) {
    return `<div style="font-size:10px;color:var(--text-muted);margin:14px 0 8px;
                        text-transform:uppercase;letter-spacing:1px;">${t}</div>`;
  }
})();
</script>
</body>
</html>
